<!DOCTYPE html>
<html>
<head>
<title>Advanced Hospital System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar navbar-dark bg-primary p-2">
<span class="navbar-brand">🏥 Hospital System</span>
<button class="btn btn-dark" onclick="toggleDarkMode()">🌙</button>
</nav>

<div class="container-fluid">
<div class="row">

<!-- SIDEBAR -->
<div class="col-md-2 sidebar">

<button onclick="show('dashboard')" class="btn btn-light w-100">Dashboard</button>
<button onclick="show('patients')" class="btn btn-light w-100">Patients</button>
<button onclick="show('doctors')" class="btn btn-light w-100">Doctors</button>
<button onclick="show('appointments')" class="btn btn-light w-100">Appointments</button>
<button onclick="show('billing')" class="btn btn-light w-100">Billing</button>
<button onclick="show('pharmacy')" class="btn btn-light w-100">Pharmacy</button>
<button onclick="show('lab')" class="btn btn-light w-100">Lab</button>
<button onclick="show('rooms')" class="btn btn-light w-100">Rooms</button>
<button onclick="show('reports')" class="btn btn-light w-100">Reports</button>
<button onclick="show('admin')" class="btn btn-light w-100">Admin</button>

</div>

<!-- CONTENT -->
<div class="col-md-10 p-3">

<!-- DASHBOARD -->
<div id="dashboard" class="page">
<h2>Dashboard</h2>

<div class="row">
<div class="col card p-2">Patients: <span id="pCount">0</span></div>
<div class="col card p-2">Doctors: <span id="dCount">0</span></div>
<div class="col card p-2">Appointments: <span id="aCount">0</span></div>
<div class="col card p-2">Revenue: ₹<span id="rCount">0</span></div>
</div>

<canvas id="chart"></canvas>
</div>

<!-- PATIENTS -->
<div id="patients" class="page d-none">
<h3>Patients</h3>

<input id="pname" class="form-control" placeholder="Name">
<input id="page" class="form-control mt-2" placeholder="Age">

<button onclick="addPatient()" class="btn btn-success mt-2">Save</button>
<button onclick="exportExcel()" class="btn btn-info mt-2">Excel</button>

<table class="table mt-3">
<tbody id="ptbl"></tbody>
</table>
</div>

<!-- DOCTORS -->
<div id="doctors" class="page d-none">
<h3>Doctors</h3>

<input id="dname" class="form-control" placeholder="Name">
<input id="dspec" class="form-control mt-2" placeholder="Specialization">

<button onclick="addDoctor()" class="btn btn-primary mt-2">Save</button>

<table class="table mt-3">
<tbody id="dtbl"></tbody>
</table>
</div>

<!-- APPOINTMENTS -->
<div id="appointments" class="page d-none">
<h3>Appointments</h3>
<input id="app" class="form-control" placeholder="Patient Name">
<button onclick="addApp()" class="btn btn-warning mt-2">Book</button>
<table class="table mt-3"><tbody id="atbl"></tbody></table>
</div>

<!-- BILLING -->
<div id="billing" class="page d-none">
<h3>Billing</h3>
<input id="bill" class="form-control" placeholder="Amount">
<button onclick="addBill()" class="btn btn-danger mt-2">Add</button>
<button onclick="downloadPDF()" class="btn btn-dark mt-2">PDF</button>
</div>

<!-- PHARMACY -->
<div id="pharmacy" class="page d-none">
<h3>Pharmacy</h3>
<input id="med" class="form-control">
<button onclick="addMed()" class="btn btn-success mt-2">Add</button>
<ul id="medlist"></ul>
</div>

<!-- LAB -->
<div id="lab" class="page d-none">
<h3>Lab</h3>
<input id="test" class="form-control">
<button onclick="addTest()" class="btn btn-info mt-2">Add</button>
<ul id="testlist"></ul>
</div>

<!-- ROOMS -->
<div id="rooms" class="page d-none">
<h3>Rooms</h3>
<input id="room" class="form-control">
<button onclick="addRoom()" class="btn btn-primary mt-2">Add</button>
<ul id="roomlist"></ul>
</div>

<!-- REPORTS -->
<div id="reports" class="page d-none">
<h3>Reports</h3>
<canvas id="reportChart"></canvas>
</div>

<!-- ADMIN -->
<div id="admin" class="page d-none">
<h3>Admin Login</h3>

<input id="user" class="form-control" placeholder="Username">
<input id="pass" class="form-control mt-2" type="password" placeholder="Password">

<button onclick="login()" class="btn btn-dark mt-2">Login</button>
<p id="msg"></p>
</div>

</div>
</div>
</div>

<script src="script.js"></script>
</body>
</html>
