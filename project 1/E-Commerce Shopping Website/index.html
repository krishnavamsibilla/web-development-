<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopEasy</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background:#f5f5f5;
}

.hero{
background:linear-gradient(to right,#007bff,#00c6ff);
color:white;
padding:80px;
text-align:center;
}

.product-img{
height:220px;
object-fit:cover;
}

.card{
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.dark-mode{
background:#222;
color:white;
}

.dark-mode .card{
background:#333;
color:white;
}

footer{
background:#000;
color:#fff;
padding:20px;
margin-top:40px;
}
</style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container">

<a class="navbar-brand" href="#">
ShopEasy
</a>

<button class="navbar-toggler"
data-bs-toggle="collapse"
data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="menu">

<form class="d-flex ms-auto me-3">
<input type="search"
class="form-control"
id="searchInput"
placeholder="Search Products">
</form>

<select
class="form-select w-auto me-3"
id="categoryFilter">

<option value="all">
All Categories
</option>

<option value="Electronics">
Electronics
</option>

<option value="Fashion">
Fashion
</option>

<option value="Shoes">
Shoes
</option>

</select>

<select
class="form-select w-auto me-3"
id="sortFilter">

<option value="">
Sort
</option>

<option value="low">
Low To High
</option>

<option value="high">
High To Low
</option>

</select>

<button
class="btn btn-warning me-2">

Cart
<span id="cartCount">
0
</span>

</button>

<button
id="themeBtn"
class="btn btn-light">

🌙

</button>

</div>
</div>
</nav>

<div class="hero">

<h1>
Online Shopping Store
</h1>

<p>
Latest Products Available
</p>

</div>

<div class="container mt-4">

<div class="row" id="productContainer">

</div>

</div>

<div class="container mt-5">

<h3>
Shopping Cart
</h3>

<table class="table table-bordered">

<thead>

<tr>

<th>Name</th>
<th>Price</th>
<th>Qty</th>
<th>Total</th>
<th>Action</th>

</tr>

</thead>

<tbody id="cartTable"></tbody>

</table>

<div class="row">

<div class="col-md-6">

<input
type="text"
id="coupon"
class="form-control"
placeholder="Enter Coupon">

</div>

<div class="col-md-3">

<button
class="btn btn-success"
onclick="applyCoupon()">

Apply Coupon

</button>

</div>

</div>

<h4 class="mt-3">

Grand Total:
₹<span id="totalPrice">
0
</span>

</h4>

</div>

<footer class="text-center">

<h5>
ShopEasy E-Commerce Website
</h5>

<p>
HTML | CSS | Bootstrap | JavaScript
</p>

</footer>

<script>

const products=[

{
id:1,
name:"Laptop",
price:50000,
category:"Electronics",
rating:4.5,
stock:10,
image:"https://picsum.photos/300?1"
},

{
id:2,
name:"Mobile",
price:25000,
category:"Electronics",
rating:4.2,
stock:8,
image:"https://picsum.photos/300?2"
},

{
id:3,
name:"T-Shirt",
price:800,
category:"Fashion",
rating:4.0,
stock:15,
image:"https://picsum.photos/300?3"
},

{
id:4,
name:"Jeans",
price:1200,
category:"Fashion",
rating:4.4,
stock:12,
image:"https://picsum.photos/300?4"
},

{
id:5,
name:"Shoes",
price:2000,
category:"Shoes",
rating:4.7,
stock:6,
image:"https://picsum.photos/300?5"
}

];

let cart=
JSON.parse(
localStorage.getItem("cart")
)||[];

let discount=0;

const productContainer=
document.getElementById(
"productContainer"
);

function displayProducts(data){

productContainer.innerHTML="";

data.forEach(product=>{

productContainer.innerHTML+=`

<div class="col-md-4 mb-4">

<div class="card">

<img
src="${product.image}"
class="card-img-top product-img">

<div class="card-body">

<h5>
${product.name}
</h5>

<p>
₹${product.price}
</p>

<p>
Category:
${product.category}
</p>

<p>
⭐ ${product.rating}
</p>

<p>
Stock:
${product.stock}
</p>

<button
class="btn btn-primary"
onclick="addToCart(${product.id})">

Add To Cart

</button>

</div>
</div>
</div>

`;

});

}

displayProducts(products);

function addToCart(id){

let product=
products.find(
p=>p.id===id
);

let existing=
cart.find(
item=>item.id===id
);

if(existing){

existing.qty++;

}
else{

cart.push({
...product,
qty:1
});

}

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

updateCart();

}

function updateCart(){

document.getElementById(
"cartCount"
).innerText=cart.length;

let total=0;

let cartTable=
document.getElementById(
"cartTable"
);

cartTable.innerHTML="";

cart.forEach((item,index)=>{

let itemTotal=
item.price*item.qty;

total+=itemTotal;

cartTable.innerHTML+=`

<tr>

<td>
${item.name}
</td>

<td>
₹${item.price}
</td>

<td>

<button
class="btn btn-sm btn-secondary"
onclick="decreaseQty(${index})">

-

</button>

${item.qty}

<button
class="btn btn-sm btn-secondary"
onclick="increaseQty(${index})">

+

</button>

</td>

<td>
₹${itemTotal}
</td>

<td>

<button
class="btn btn-danger"
onclick="removeItem(${index})">

Delete

</button>

</td>

</tr>

`;

});

if(discount>0){

total=total-(total*discount/100);

}

document.getElementById(
"totalPrice"
).innerText=total;

}

function increaseQty(index){

cart[index].qty++;

saveCart();

}

function decreaseQty(index){

if(cart[index].qty>1){

cart[index].qty--;

}

saveCart();

}

function removeItem(index){

cart.splice(index,1);

saveCart();

}

function saveCart(){

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

updateCart();

}

function applyCoupon(){

let code=
document.getElementById(
"coupon"
).value;

if(code==="SAVE10"){

discount=10;

alert(
"10% Discount Applied"
);

}
else{

alert(
"Invalid Coupon"
);

}

updateCart();

}

updateCart();

document
.getElementById("searchInput")
.addEventListener(
"keyup",
function(){

let value=
this.value
.toLowerCase();

let filtered=
products.filter(
product=>

product.name
.toLowerCase()
.includes(value)

);

displayProducts(
filtered
);

});

document
.getElementById(
"categoryFilter"
)
.addEventListener(
"change",
function(){

let category=
this.value;

if(category==="all"){

displayProducts(
products
);

return;

}

let filtered=
products.filter(
p=>
p.category===category
);

displayProducts(
filtered
);

});

document
.getElementById(
"sortFilter"
)
.addEventListener(
"change",
function(){

let value=
this.value;

let data=
[...products];

if(value==="low"){

data.sort(
(a,b)=>
a.price-b.price
);

}

if(value==="high"){

data.sort(
(a,b)=>
b.price-a.price
);

}

displayProducts(
data
);

});

document
.getElementById(
"themeBtn"
)
.addEventListener(
"click",
()=>{

document.body.classList.toggle(
"dark-mode"
);

});

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
